<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<title>குடும்ப மேலாண்மை</title>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
button { padding: 10px; margin: 5px; cursor:pointer; }
input { padding: 8px; margin: 5px 0; width: 100%; }

.hidden { display: none; }

/* Modal Fix */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.5);
}
.modal.show {
  display: flex;
}

.modal-box {
  background: #fff;
  padding: 20px;
  width: 300px;
  border-radius: 10px;
  animation: popup 0.2s ease;
}

@keyframes popup {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}
th, td {
  border: 1px solid #000;
  padding: 6px;
  text-align: center;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <h2>📄 PDF Upload</h2>
  <input type="file" id="pdfUpload">
  <button onclick="processPDF()">Upload & Read</button>

  <br><br>
  <button onclick="startFamily()">➕ புதிய குடும்பம்</button>
</div>

<!-- FAMILY SCREEN -->
<div id="familyScreen" class="hidden">
  <h3>👨‍👩‍👧 குடும்ப உறுப்பினர்கள்</h3>

  <button onclick="openModal()">➕ உறுப்பினர் சேர்</button>

  <table>
    <thead>
      <tr><th>எண்</th><th>பெயர்</th><th>வயது</th></tr>
    </thead>
    <tbody id="membersTable"></tbody>
  </table>

  <h4>🏳️ கட்சி</h4>
  <label><input type="radio" name="party" value="DMK"> DMK</label>
  <label><input type="radio" name="party" value="ADMK"> ADMK</label>
  <label><input type="radio" name="party" value="TVK"> TVK</label>
  <label><input type="radio" name="party" value="CPM"> CPM</label>
  <label><input type="radio" name="party" value="OTHER"> Others</label>

  <input type="text" id="otherParty" placeholder="கட்சி பெயர்" class="hidden">

  <br><br>
  <button onclick="saveFamily()">💾 Save Family</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="outsideClick(event)">
  <div class="modal-box">
    <h4>உறுப்பினர் சேர்க்க</h4>

    <input type="number" id="memberNo" placeholder="எண்">

    <div id="manualEntry" class="hidden">
      <input type="text" id="name" placeholder="பெயர்">
      <input type="number" id="age" placeholder="வயது">
    </div>

    <button onclick="handleAdd()">சேர்</button>
    <button onclick="closeModal()">மூடு</button>
  </div>
</div>

<script>

let extractedText = "";
let currentFamily = [];
let usedNumbers = new Set();
let isManualMode = false;

// OCR
function processPDF() {
  const file = document.getElementById("pdfUpload").files[0];
  if (!file) return alert("PDF upload செய்யவும்");

  alert("Processing...");

  Tesseract.recognize(file, 'tam+eng').then(({ data: { text } }) => {
    extractedText = text;
    alert("PDF Ready ✅");
  });
}

// Navigation
function startFamily() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("familyScreen").classList.remove("hidden");
}

// Modal
function openModal() {
  document.getElementById("modal").classList.add("show");
  resetModal();
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
  resetModal();
}

function outsideClick(e) {
  if (e.target.id === "modal") {
    closeModal();
  }
}

function resetModal() {
  document.getElementById("memberNo").value = "";
  document.getElementById("name").value = "";
  document.getElementById("age").value = "";
  document.getElementById("manualEntry").classList.add("hidden");
  isManualMode = false;
}

// OCR search
function findPerson(no) {
  const lines = extractedText.split("\n");
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].includes(no)) {
      return {
        no,
        name: lines[i+1] || "Unknown",
        age: "-"
      };
    }
  }
  return null;
}

// Add Member
function handleAdd() {
  const no = document.getElementById("memberNo").value;

  if (!no) return alert("எண் உள்ளிடவும்");

  if (usedNumbers.has(no)) return alert("Duplicate ❌");

  if (isManualMode) {
    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;

    if (!name) return alert("பெயர் தேவை");

    currentFamily.push({ no, name, age });
    usedNumbers.add(no);

    render();
    closeModal();
    return;
  }

  const person = findPerson(no);

  if (person) {
    currentFamily.push(person);
    usedNumbers.add(no);

    render();
    closeModal();
  } else {
    if (confirm("Data இல்லை. Manual entry வேண்டுமா?")) {
      document.getElementById("manualEntry").classList.remove("hidden");
      isManualMode = true;
    } else {
      closeModal();
    }
  }
}

// Render
function render() {
  const tbody = document.getElementById("membersTable");
  tbody.innerHTML = "";

  currentFamily.forEach(m => {
    tbody.innerHTML += `
      <tr>
        <td>${m.no}</td>
        <td>${m.name}</td>
        <td>${m.age}</td>
      </tr>`;
  });
}

// Party toggle
document.querySelectorAll('input[name="party"]').forEach(r => {
  r.addEventListener("change", () => {
    document.getElementById("otherParty").classList.toggle(
      "hidden", r.value !== "OTHER"
    );
  });
});

// Save
function saveFamily() {
  let party = document.querySelector('input[name="party"]:checked')?.value;

  if (party === "OTHER") {
    party = document.getElementById("otherParty").value;
  }

  alert("Saved ✅ Party: " + (party || "Not selected"));

  currentFamily = [];
  usedNumbers.clear();
  render();
}

</script>

</body>
</html>
